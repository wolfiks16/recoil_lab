{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Расчёт откатной системы{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'recoil_app/css/style.css' %}">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
<header class="site-header">
    <div class="site-header__inner">
        <div class="site-brand">
            <a href="{% url 'index' %}">RecoilLab</a>
            <span class="site-brand__sub">инженерный расчёт откатных систем</span>
        </div>

        <nav class="site-nav">
            <a href="{% url 'index' %}">Новый расчёт</a>
            <a href="{% url 'compare' %}">Сравнение</a>
            <a href="/admin/">Админка</a>
        </nav>
    </div>
</header>

<main class="page">
    {% block content %}{% endblock %}
</main>

<button id="scrollToTopBtn" class="scroll-to-top" type="button" aria-label="Наверх">
    ↑
</button>

<script>
(function () {
    const btn = document.getElementById("scrollToTopBtn");
    if (!btn) return;

    function toggleButton() {
        if (window.scrollY > 300) {
            btn.classList.add("visible");
        } else {
            btn.classList.remove("visible");
        }
    }

    btn.addEventListener("click", function () {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });

    window.addEventListener("scroll", toggleButton);
    toggleButton();
})();
</script>
</body>
</html>
