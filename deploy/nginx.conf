# RecoilLab — nginx server block.
# Положить в /etc/nginx/sites-available/recoillab
# и сделать symlink: /etc/nginx/sites-enabled/recoillab

server {
    listen 80;
    server_name 185.250.47.144;

    # Расчёт может загружать Excel-файлы характеристик и таблицу F(v).
    # 25M — запас, типичный файл сильно меньше.
    client_max_body_size 25M;

    # Статика: собирается через `manage.py collectstatic` в staticfiles/.
    location /static/ {
        alias /srv/recoil_lab/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Media: загруженные расчёты, графики, отчёты, curve-файлы тормозов.
    location /media/ {
        alias /srv/recoil_lab/media/;
        access_log off;
        expires 30d;
    }

    # Всё остальное — на gunicorn через Unix socket.
    # ВАЖНО: путь сокета должен совпадать с --bind в deploy/gunicorn.service.
    # Опечатка в этом пути (например, reciol.sock вместо recoil.sock) даёт 502.
    location / {
        proxy_pass http://unix:/run/recoil.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Расчёт делается синхронно в index_view → запрос может идти долго.
        # 300s = 5 минут запас. Должно совпадать с --timeout в gunicorn.service.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
